name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Check plugin version consistency
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const claude = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
          const codex = JSON.parse(fs.readFileSync('.codex-plugin/plugin.json', 'utf8'));
          const market = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));
          const codexMarket = JSON.parse(fs.readFileSync('.agents/plugins/marketplace.json', 'utf8'));
          const versions = [
            claude.version,
            codex.version,
            market.metadata?.version,
            market.plugins?.find((plugin) => plugin.name === claude.name)?.version,
            codexMarket.metadata?.version,
            codexMarket.plugins?.find((plugin) => plugin.name === claude.name)?.version
          ];
          if (!versions.every((version) => version === claude.version)) {
            console.error(`plugin versions differ: ${versions.join(', ')}`);
            process.exit(1);
          }
          NODE
